<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicación — PinVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .like-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .like-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .like-btn.liked {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .like-btn svg {
      width: 16px; height: 16px;
      transition: transform 0.2s;
    }
    .like-btn.liked svg {
      fill: var(--accent);
      transform: scale(1.15);
    }
    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .share-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .share-btn svg { width: 16px; height: 16px; }

    .related-title {
      font-size: 20px;
      font-weight: 700;
      padding: 32px 24px 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 600px) {
      .related-title { padding: 24px 16px 0; }
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<main class="main" id="detail-main">
  <div id="detail-content"></div>
  <p class="related-title" id="related-label" style="display:none">Más como esto</p>
  <div class="masonry-grid" id="related-grid" style="margin-top:8px"></div>
</main>

<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const pinId = params.get('id');
  let pin = null;
  let liked = false;
  let saved = false;

  async function init() {
    renderNavbar();
    if (!pinId) { window.location.href = 'index.html'; return; }

    try {
      const data = await API.getPin(pinId);
      pin   = data.pin;
      liked = pin.isLiked || false;
      saved = pin.isSaved || false;
      document.title = pin.title + ' — PinVault';
      renderDetail();
      renderComments();
      renderRelated();
    } catch (err) {
      document.getElementById('detail-content').innerHTML =
        '<p style="padding:60px;text-align:center;color:var(--text-muted)">Publicación no encontrada.</p>';
    }
  }

  function renderDetail() {
    const commentsPlaceholder = '…';
    document.getElementById('detail-content').innerHTML = `
      <div class="detail-wrap">
        <div class="detail-img-col">
          <div class="detail-img-wrap">
            <img src="${pin.imageUrl}" alt="${pin.title}" id="detail-img">
          </div>
        </div>

        <div class="detail-info-col">
          <div class="detail-actions">
            <button class="like-btn ${liked ? 'liked' : ''}" id="like-btn" onclick="toggleLike()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              <span id="like-count">${Utils.formatNum(pin.likes)}</span>
            </button>
            <button class="btn btn-primary" id="save-btn" onclick="toggleSave()" style="${saved ? 'background:#333;' : ''}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="${saved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
              ${saved ? 'Guardado' : 'Guardar'}
            </button>
            <button class="share-btn" onclick="sharePin()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
              Compartir
            </button>
          </div>

          <h1 class="detail-title">${pin.title}</h1>
          ${pin.description ? `<p class="detail-desc">${pin.description}</p>` : ''}

          ${pin.tags && pin.tags.length ? `
            <div class="tags-list">
              ${pin.tags.map(t => `<a class="detail-tag" href="index.html?q=${encodeURIComponent(t)}">#${t}</a>`).join('')}
            </div>
          ` : ''}

          <a href="usuario.html?id=${pin.username}" class="detail-author-row" style="text-decoration:none">
            <div class="avatar" style="width:44px;height:44px;font-size:16px;background:${Utils.avatarGradient(pin.displayName)};flex-shrink:0">
              ${Utils.getInitials(pin.displayName)}
            </div>
            <div class="detail-author-info">
              <p class="detail-author-name">${pin.displayName}</p>
              <p class="detail-author-meta">@${pin.username}</p>
            </div>
            <span style="font-size:13px;color:var(--accent);font-weight:500">Ver perfil</span>
          </a>

          <div class="detail-meta">
            <span class="detail-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              ${Utils.formatDate(pin.createdAt)}
            </span>
            <span class="detail-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              ${Utils.formatNum(pin.likes)} me gusta
            </span>
            <span class="detail-meta-item" style="text-transform:capitalize">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
              ${pin.category}
            </span>
          </div>

          <div class="comments-section" id="comments-section"></div>
        </div>
      </div>
    `;
  }

  async function renderComments() {
    const section = document.getElementById('comments-section');
    if (!section) return;
    const user = DB.getCurrentUser();
    let comments = [];
    try {
      const data = await API.getComments(pinId);
      comments = data.comments;
    } catch (_) {}

    section.innerHTML = `
      <h2 class="comments-title">Comentarios (${comments.length})</h2>

      ${user ? `
        <div class="comment-input-wrap">
          <div class="avatar" style="width:32px;height:32px;font-size:12px;flex-shrink:0;background:${Utils.avatarGradient(user.displayName)}">
            ${Utils.getInitials(user.displayName)}
          </div>
          <textarea class="comment-textarea" id="comment-input" placeholder="Deja un comentario…" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="comment-send-btn" onclick="submitComment()" aria-label="Enviar comentario">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      ` : `
        <p style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px 0">
          <a href="login.html" style="color:var(--accent);font-weight:500">Inicia sesión</a> para dejar un comentario
        </p>
      `}

      ${comments.length === 0 ? `
        <div class="empty-state" style="padding:32px 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <h3>Sin comentarios aún</h3>
          <p>Sé el primero en comentar.</p>
        </div>
      ` : comments.map(c => `
        <div class="comment">
          <div class="avatar" style="width:32px;height:32px;font-size:12px;flex-shrink:0;background:${Utils.avatarGradient(c.displayName)}">
            ${Utils.getInitials(c.displayName)}
          </div>
          <div class="comment-body">
            <div class="comment-header">
              <span class="comment-author">${c.displayName}</span>
              <span class="comment-date">${Utils.timeAgo(c.createdAt)}</span>
            </div>
            <p class="comment-text">${c.text}</p>
          </div>
        </div>
      `).join('')}
    `;
  }

  async function renderRelated() {
    try {
      const { pins } = await API.getPins({ category: pin.category, limit: 8 });
      const related = pins.filter(p => p.id !== pinId).slice(0, 8);
      if (related.length === 0) return;
      document.getElementById('related-label').style.display = 'block';
      document.getElementById('related-grid').innerHTML = related.map(renderPinCard).join('');
    } catch (_) {}
  }

  async function toggleLike() {
    const user = DB.getCurrentUser();
    if (!user) { window.location.href = 'login.html'; return; }
    try {
      const { liked: newLiked, likes } = await API.likePin(pinId);
      liked = newLiked;
      pin.likes = likes;
      document.getElementById('like-btn').classList.toggle('liked', liked);
      document.getElementById('like-count').textContent = Utils.formatNum(likes);
      Utils.showToast(liked ? 'Le diste me gusta' : 'Quitaste el me gusta');
    } catch (err) {
      Utils.showToast(err.message, 'error');
    }
  }

  async function toggleSave() {
    const user = DB.getCurrentUser();
    if (!user) { window.location.href = 'login.html'; return; }
    try {
      const { saved: newSaved } = await API.savePin(pinId);
      saved = newSaved;
      const btn = document.getElementById('save-btn');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${saved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>${saved ? 'Guardado' : 'Guardar'}`;
      btn.style.background = saved ? '#333' : '';
      Utils.showToast(saved ? 'Guardado en tu colección' : 'Eliminado de guardados');
    } catch (err) {
      Utils.showToast(err.message, 'error');
    }
  }

  function sharePin() {
    const url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => Utils.showToast('Enlace copiado'));
    } else {
      Utils.showToast('Enlace: ' + url);
    }
  }

  async function submitComment() {
    const user = DB.getCurrentUser();
    if (!user) return;
    const input = document.getElementById('comment-input');
    const text = input.value.trim();
    if (!text) return;
    try {
      await API.postComment(pinId, text);
      input.value = '';
      input.style.height = 'auto';
      renderComments();
      Utils.showToast('Comentario publicado');
    } catch (err) {
      Utils.showToast(err.message, 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
