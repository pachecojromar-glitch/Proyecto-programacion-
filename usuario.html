<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — PinVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .edit-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .edit-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      max-width: 420px;
      width: 100%;
      position: relative;
    }
    .board-card {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .board-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .board-thumb {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      height: 120px;
    }
    .board-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .board-thumb .board-main {
      grid-row: span 2;
    }
    .board-info {
      padding: 10px 12px;
    }
    .board-name {
      font-size: 14px;
      font-weight: 600;
    }
    .board-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .follow-stats-row {
      display: flex;
      gap: 24px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<main class="main">
  <div class="profile-header" id="profile-header">
    <!-- filled by JS -->
  </div>

  <div class="profile-tabs" id="profile-tabs">
    <button class="profile-tab active" data-tab="pins">Publicaciones</button>
    <button class="profile-tab" data-tab="saved">Guardados</button>
    <button class="profile-tab" data-tab="boards">Tableros</button>
  </div>

  <div class="profile-grid">
    <div class="masonry-grid" id="pins-grid" style="padding-top:24px"></div>
    <div class="masonry-grid" id="saved-grid" style="padding-top:24px;display:none"></div>
    <div class="masonry-grid" id="boards-grid" style="padding-top:24px;display:none"></div>
  </div>
</main>

<!-- Edit profile modal -->
<div class="edit-modal-bg" id="edit-modal" style="display:none">
  <div class="edit-modal">
    <button onclick="closeEdit()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px">Editar perfil</h2>
    <div style="text-align:center;margin-bottom:24px">
      <div id="edit-avatar-preview" class="avatar" style="width:72px;height:72px;font-size:24px;margin:0 auto 12px"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-input" id="edit-name">
    </div>
    <div class="form-group">
      <label class="form-label">Nombre de usuario</label>
      <div class="input-wrap">
        <input type="text" class="form-input" id="edit-username" style="padding-left:28px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none">@</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Biografía</label>
      <textarea class="form-input" id="edit-bio" rows="3" style="resize:vertical" placeholder="Cuéntanos sobre ti…"></textarea>
    </div>
    <button class="form-submit" onclick="saveProfile()">Guardar cambios</button>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const viewUserId = params.get('id'); // puede ser username o id
  let profileUser = null;
  let isOwn = false;

  async function init() {
    renderNavbar('usuario');
    const sessionUser = DB.getCurrentUser();

    try {
      // viewUserId puede ser username; si no hay, mostramos el usuario actual
      const target = viewUserId || (sessionUser ? sessionUser.username : null);
      if (!target) { window.location.href = 'login.html'; return; }

      const data = await API.getUser(target);
      profileUser = data.user;
      isOwn = sessionUser && profileUser && (sessionUser.id === profileUser.id || sessionUser.username === profileUser.username);

      renderHeader();
      renderPins();
      setupTabs();
    } catch (err) {
      document.getElementById('profile-header').innerHTML =
        '<p style="padding:40px;color:var(--text-muted)">Usuario no encontrado</p>';
    }
  }

  async function renderHeader() {
    document.title = profileUser.displayName + ' — PinVault';

    document.getElementById('profile-header').innerHTML = `
      <div class="profile-avatar-lg" style="background:${Utils.avatarGradient(profileUser.displayName)}">
        ${Utils.getInitials(profileUser.displayName)}
      </div>
      <h1 class="profile-name">${profileUser.displayName}</h1>
      <p class="profile-username">@${profileUser.username}</p>
      ${profileUser.bio ? `<p class="profile-bio">${profileUser.bio}</p>` : ''}
      <div class="follow-stats-row">
        <div class="profile-stat">
          <span class="profile-stat-num">${profileUser.pinCount || 0}</span>
          <span class="profile-stat-label">publicaciones</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-num">${Utils.formatNum(profileUser.followers || 0)}</span>
          <span class="profile-stat-label">seguidores</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-num">${Utils.formatNum(profileUser.following || 0)}</span>
          <span class="profile-stat-label">seguidos</span>
        </div>
      </div>
      <div class="profile-actions">
        ${isOwn ? `
          <button class="btn btn-primary" onclick="openEdit()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Editar perfil
          </button>
          <button class="btn btn-ghost" onclick="handleLogout()">Cerrar sesión</button>
        ` : `
          <button class="btn btn-primary" id="follow-btn" onclick="handleFollow()">Seguir</button>
          <button class="btn btn-ghost">Mensaje</button>
        `}
      </div>
    `;
  }

  async function renderPins() {
    const grid = document.getElementById('pins-grid');
    grid.innerHTML = '<p style="padding:20px;text-align:center;color:var(--text-muted)">Cargando…</p>';
    try {
      const { pins } = await API.getUserPins(profileUser.username);
      if (pins.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="column-span:all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"></polyline></svg>
          <h3>Sin publicaciones aún</h3>
          <p>${isOwn ? 'Crea tu primera publicación desde el botón "Crear".' : 'Este usuario no ha publicado nada todavía.'}</p>
        </div>`;
      } else {
        grid.innerHTML = pins.map(renderPinCard).join('');
      }
    } catch (_) {
      grid.innerHTML = '<p style="padding:20px;color:var(--text-muted)">Error al cargar publicaciones.</p>';
    }
  }

  async function renderSaved() {
    const grid = document.getElementById('saved-grid');
    grid.innerHTML = '<p style="padding:20px;text-align:center;color:var(--text-muted)">Cargando…</p>';
    try {
      const { pins } = await API.getUserSaved(profileUser.username);
      if (pins.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="column-span:all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          <h3>Sin guardados</h3>
          <p>Guarda publicaciones que te interesen para verlas aquí.</p>
        </div>`;
      } else {
        grid.innerHTML = pins.map(renderPinCard).join('');
      }
    } catch (err) {
      grid.innerHTML = '<p style="padding:20px;color:var(--text-muted)">Solo puedes ver tus propios guardados.</p>';
    }
  }

  async function renderBoards() {
    const grid = document.getElementById('boards-grid');
    try {
      const { pins } = await API.getUserPins(profileUser.username);
      const boards = {};
      pins.forEach(p => {
        if (!boards[p.category]) boards[p.category] = [];
        boards[p.category].push(p);
      });

      if (Object.keys(boards).length === 0) {
        grid.innerHTML = `<div class="empty-state" style="column-span:all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <h3>Sin tableros</h3>
          <p>Los tableros se crean automáticamente con tus publicaciones.</p>
        </div>`;
        return;
      }

      grid.innerHTML = Object.entries(boards).map(([cat, catPins]) => `
        <div class="board-card">
          <div class="board-thumb">
            <div class="board-main"><img src="${catPins[0].imageUrl}" alt="${cat}" loading="lazy"></div>
            ${catPins[1] ? `<div><img src="${catPins[1].imageUrl}" alt="" loading="lazy"></div>` : '<div style="background:var(--bg-hover)"></div>'}
            ${catPins[2] ? `<div><img src="${catPins[2].imageUrl}" alt="" loading="lazy"></div>` : '<div style="background:var(--bg-hover)"></div>'}
          </div>
          <div class="board-info">
            <p class="board-name">${cat}</p>
            <p class="board-count">${catPins.length} pin${catPins.length !== 1 ? 's' : ''}</p>
          </div>
        </div>
      `).join('');
    } catch (_) {}
  }

  function setupTabs() {
    document.querySelectorAll('.profile-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('pins-grid').style.display = 'none';
        document.getElementById('saved-grid').style.display = 'none';
        document.getElementById('boards-grid').style.display = 'none';
        const tab = btn.dataset.tab;
        document.getElementById(tab === 'boards' ? 'boards-grid' : tab === 'saved' ? 'saved-grid' : 'pins-grid').style.display = '';
        if (tab === 'saved') renderSaved();
        if (tab === 'boards') renderBoards();
      });
    });
  }

  function openEdit() {
    const user = DB.getCurrentUser();
    document.getElementById('edit-name').value = user.displayName;
    document.getElementById('edit-username').value = user.username;
    document.getElementById('edit-bio').value = user.bio || '';
    const av = document.getElementById('edit-avatar-preview');
    av.textContent = Utils.getInitials(user.displayName);
    av.style.background = Utils.avatarGradient(user.displayName);
    document.getElementById('edit-modal').style.display = 'flex';
  }

  function closeEdit() {
    document.getElementById('edit-modal').style.display = 'none';
  }

  async function saveProfile() {
    const name = document.getElementById('edit-name').value.trim();
    const bio  = document.getElementById('edit-bio').value.trim();
    if (!name) { Utils.showToast('El nombre es requerido', 'error'); return; }
    try {
      const { user } = await API.updateProfile({ displayName: name, bio });
      DB.setCurrentUser(user);
      profileUser = user;
      closeEdit();
      renderHeader();
      Utils.showToast('Perfil actualizado');
    } catch (err) {
      Utils.showToast(err.message, 'error');
    }
  }

  function handleLogout() {
    DB.logout();
    window.location.href = 'index.html';
  }

  function handleFollow() {
    const btn = document.getElementById('follow-btn');
    if (!btn) return;
    const isFollowing = btn.textContent.trim() === 'Siguiendo';
    btn.textContent = isFollowing ? 'Seguir' : 'Siguiendo';
    btn.style.background = isFollowing ? '' : 'var(--bg-hover)';
    Utils.showToast(isFollowing ? 'Dejaste de seguir' : 'Siguiendo a ' + profileUser.displayName);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
